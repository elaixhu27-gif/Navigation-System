<!DOCTYPE html>
<html>
<head>
    <title>Navigation System</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            margin: 0;
            padding: 10px;
        }

        input {
            width: 80%;
            padding: 10px;
            margin: 5px;
        }

        button {
            padding: 10px;
            width: 85%;
            background: blue;
            color: white;
            border: none;
        }

        #map {
            height: 400px;
            margin-top: 10px;
        }
    </style>
</head>

<body>

<h2>Navigation System</h2>

<input id="start" placeholder="Start Location">
<input id="destination" placeholder="Destination">
<br>
<button onclick="findRoute()">Find Route</button>

<p id="result"></p>

<div id="map"></div>

<h3>History</h3>
<ul id="history"></ul>

<script>
let map = L.map('map').setView([14.5995, 120.9842], 10);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    attribution: 'OpenStreetMap'
}).addTo(map);

let routeLayer;

function findRoute() {
    let start = document.getElementById("start").value;
    let destination = document.getElementById("destination").value;

    fetch("/route", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({start, destination})
    })
    .then(res => res.json())
    .then(data => {

        if (data.error) {
            alert(data.error);
            return;
        }

        document.getElementById("result").innerText =
            `Distance: ${data.distance.toFixed(2)} km | ETA: ${data.duration.toFixed(1)} mins`;

        if (routeLayer) {
            map.removeLayer(routeLayer);
        }

        routeLayer = L.geoJSON(data.geometry).addTo(map);
        map.fitBounds(routeLayer.getBounds());

        loadHistory();
    });
}

function loadHistory() {
    fetch("/history")
    .then(res => res.json())
    .then(data => {
        let list = document.getElementById("history");
        list.innerHTML = "";

        data.forEach(row => {
            let item = document.createElement("li");
            item.textContent = `${row[1]} → ${row[2]} (${row[3].toFixed(2)} km)`;
            list.appendChild(item);
        });
    });
}

loadHistory();
</script>

</body>
</html>
